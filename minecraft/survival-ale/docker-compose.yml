services:
  mc:
    image: itzg/minecraft-server
    # image: itzg/minecraft-server:java8
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      VERSION: "1.20.1"
      EULA: "TRUE"
      MEMORY: 16G
      TYPE: "forge"
      OPS: |
        MisterCricro
      ALLOW_FLIGHT: true

    volumes:
      - ./data:/data
